<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ディスクアップUR ビタ押し練習</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: #1f1f1f;
    color: #ffffff;
    font-family: sans-serif;
    text-align: center;
  }

  #app {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    padding: 16px 12px 28px;
  }

  #controls {
    margin: 8px 0 14px;
  }

  #start-btn {
    width: 100%;
    padding: 16px 20px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    touch-action: manipulation;
  }

  .machine {
    display: flex;
    justify-content: center;
    gap: 10px;
    width: 100%;
    margin: 0 auto 14px;
  }

  .reel-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .reel-window {
    width: 100%;
    aspect-ratio: 7 / 10;
    position: relative;
    overflow: hidden;
    border: 2px solid #f0c400;
    background: #ffffff;
  }

  .reel-strip-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: calc(100% * 40 / 3);
    will-change: transform, filter;
    filter: blur(0px);
  }

  .reel-image {
    width: 100%;
    height: 50%;
    background-image: url('./assets/reel.jpg');
    background-size: 300% 100%;
    background-repeat: no-repeat;
    background-position-y: 0%;
  }

  .reel-left .reel-image {
    background-position-x: 0%;
  }

  .reel-center .reel-image {
    background-position-x: 50%;
  }

  .reel-right .reel-image {
    background-position-x: 100%;
  }

  .stop-btn {
    width: 100%;
    padding: 14px 8px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    touch-action: manipulation;
  }

  .panel {
    width: 100%;
    margin: 0 auto 12px;
    padding: 12px;
    background: #0f0f0f;
    border: 1px solid #444;
    text-align: left;
    line-height: 1.65;
  }

  .panel-title {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .subtle {
    color: #d0d0d0;
    font-size: 13px;
  }

  .judge-good {
    color: #7dff98;
    font-weight: bold;
  }

  .judge-info {
    color: #7fe7ff;
    font-weight: bold;
  }

  .judge-warn {
    color: #ffd36b;
    font-weight: bold;
  }

  .judge-bad {
    color: #ff8f8f;
    font-weight: bold;
  }

  .big-result {
    margin-top: 8px;
    font-size: 24px;
    font-weight: bold;
    line-height: 1.3;
  }

  .small-result {
    font-size: 15px;
    margin-top: 4px;
  }

  #stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 12px;
    font-size: 14px;
  }

  #log-controls {
    display: flex;
    gap: 8px;
    margin: 8px 0 10px;
  }

  #log-controls button {
    flex: 1;
    padding: 11px 8px;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    touch-action: manipulation;
  }

  #log-output {
    width: 100%;
    min-height: 220px;
    resize: vertical;
    background: #080808;
    color: #dddddd;
    border: 1px solid #555;
    padding: 10px;
    font-family: monospace;
    font-size: 12px;
    line-height: 1.5;
  }

  .muted {
    color: #aaaaaa;
  }
</style>
</head>
<body>
  <div id="app">
    <div id="controls">
      <button id="start-btn">レバーオン（スタート）</button>
    </div>

    <div class="machine">
      <div class="reel-container">
        <div class="reel-window reel-left" id="window-left">
          <div class="reel-strip-wrapper" id="wrap-left">
            <div class="reel-image"></div>
            <div class="reel-image"></div>
          </div>
        </div>
        <button class="stop-btn" data-reel="left" disabled>左 停止</button>
      </div>

      <div class="reel-container">
        <div class="reel-window reel-center" id="window-center">
          <div class="reel-strip-wrapper" id="wrap-center">
            <div class="reel-image"></div>
            <div class="reel-image"></div>
          </div>
        </div>
        <button class="stop-btn" data-reel="center" disabled>中 停止</button>
      </div>

      <div class="reel-container">
        <div class="reel-window reel-right" id="window-right">
          <div class="reel-strip-wrapper" id="wrap-right">
            <div class="reel-image"></div>
            <div class="reel-image"></div>
          </div>
        </div>
        <button class="stop-btn" data-reel="right" disabled>右 停止</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">【判定】</div>
      <div id="judge-label" class="big-result muted">-</div>
      <div id="judge-detail" class="small-result muted">中リールを止めると表示</div>
      <div id="reel-view" class="small-result muted">停止後の見え方: -</div>
    </div>

    <div class="panel">
      <div class="panel-title">【直近成績】</div>
      <div id="stats-grid">
        <div>試行数</div><div id="stat-count">0</div>
        <div>平均ズレ</div><div id="stat-avg">-</div>
        <div>PERFECT率</div><div id="stat-perfect-rate">-</div>
        <div>GOOD以上率</div><div id="stat-good-rate">-</div>
        <div>早い / 遅い</div><div id="stat-balance">-</div>
        <div>傾向</div><div id="stat-trend">-</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">【設定】</div>
      <div class="subtle">
        現在課題: <span id="task-name" class="judge-info">中リール 白7枠下ビタ</span><br>
        基準位置: <span id="task-target" class="judge-info">9</span><br>
        判定は中リール停止時の <span class="judge-warn">押下瞬間の内部位置</span> を使用
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">【中リール ログ】</div>
      <div id="log-count" class="subtle">件数: 0</div>
      <div id="log-controls">
        <button id="copy-log-btn">ログをコピー</button>
        <button id="clear-log-btn">ログを全削除</button>
      </div>
      <textarea id="log-output" readonly></textarea>
    </div>
  </div>

<script>
(() => {
  'use strict';

  const TOTAL_SYMBOLS = 20;
  const LOOP_TIME_SEC = 0.78;
  const SYMBOLS_PER_SEC = TOTAL_SYMBOLS / LOOP_TIME_SEC;
  const reels = ['left', 'center', 'right'];

  // 将来拡張用の課題定義
  const TASKS = {
    center_white7_shitabi: {
      id: 'center_white7_shitabi',
      name: '中リール 白7枠下ビタ',
      reel: 'center',
      targetPos: 9
    }
  };

  let currentTask = TASKS.center_white7_shitabi;

  const JUDGE_THRESHOLDS = {
    perfect: 0.15,
    good: 0.30,
    ok: 0.50
  };

  const VISUALS = {
    spinBlurPx: 0.55,           // 回転中の弱ブラー
    stopSettleDurationMs: 80    // 停止整列アニメーション
  };

  const LOG_STORAGE_KEY = 'discup_ur_center_logs_v3';

  const wrappers = {
    left: document.getElementById('wrap-left'),
    center: document.getElementById('wrap-center'),
    right: document.getElementById('wrap-right')
  };

  const windows = {
    left: document.getElementById('window-left'),
    center: document.getElementById('window-center'),
    right: document.getElementById('window-right')
  };

  const stopButtons = {
    left: document.querySelector('.stop-btn[data-reel="left"]'),
    center: document.querySelector('.stop-btn[data-reel="center"]'),
    right: document.querySelector('.stop-btn[data-reel="right"]')
  };

  const judgeLabelEl = document.getElementById('judge-label');
  const judgeDetailEl = document.getElementById('judge-detail');
  const reelViewEl = document.getElementById('reel-view');

  const statCountEl = document.getElementById('stat-count');
  const statAvgEl = document.getElementById('stat-avg');
  const statPerfectRateEl = document.getElementById('stat-perfect-rate');
  const statGoodRateEl = document.getElementById('stat-good-rate');
  const statBalanceEl = document.getElementById('stat-balance');
  const statTrendEl = document.getElementById('stat-trend');

  const logCountEl = document.getElementById('log-count');
  const logOutputEl = document.getElementById('log-output');
  const copyLogBtn = document.getElementById('copy-log-btn');
  const clearLogBtn = document.getElementById('clear-log-btn');

  const taskNameEl = document.getElementById('task-name');
  const taskTargetEl = document.getElementById('task-target');

  const state = {
    currentPos: { left: 0, center: 0, right: 0 },
    isSpinning: { left: false, center: false, right: false },
    isSettling: { left: false, center: false, right: false },
    lastTime: { left: 0, center: 0, right: 0 },
    animId: { left: null, center: null, right: null },
    settleAnimId: { left: null, center: null, right: null },
    trialCount: 0,
    logs: []
  };

  function initTaskDisplay() {
    taskNameEl.textContent = currentTask.name;
    taskTargetEl.textContent = String(currentTask.targetPos);
  }

  function getSymbolHeightPx(reel) {
    return windows[reel].clientHeight / 3;
  }

  function setWrapperBlur(reel, enabled) {
    wrappers[reel].style.filter = enabled ? `blur(${VISUALS.spinBlurPx}px)` : 'blur(0px)';
  }

  function updateReelDisplay(reel) {
    const symbolHeight = getSymbolHeightPx(reel);
    const baseOffset = -TOTAL_SYMBOLS * symbolHeight;
    const y = baseOffset + state.currentPos[reel] * symbolHeight;
    wrappers[reel].style.transform = `translateY(${y}px)`;
  }

  function animateReel(now, reel) {
    if (!state.isSpinning[reel]) return;

    const deltaSec = (now - state.lastTime[reel]) / 1000;
    state.lastTime[reel] = now;

    state.currentPos[reel] += SYMBOLS_PER_SEC * deltaSec;
    state.currentPos[reel] %= TOTAL_SYMBOLS;

    updateReelDisplay(reel);
    state.animId[reel] = requestAnimationFrame((t) => animateReel(t, reel));
  }

  function startAllReels() {
    reels.forEach((reel) => {
      cancelAnimationFrame(state.animId[reel]);
      cancelAnimationFrame(state.settleAnimId[reel]);

      state.isSpinning[reel] = true;
      state.isSettling[reel] = false;
      state.currentPos[reel] = Math.random() * TOTAL_SYMBOLS;
      state.lastTime[reel] = performance.now();

      setWrapperBlur(reel, true);
      updateReelDisplay(reel);
      state.animId[reel] = requestAnimationFrame((t) => animateReel(t, reel));

      stopButtons[reel].disabled = false;
    });

    resetJudgeDisplay();
  }

  function stopReel(reel) {
    if (!state.isSpinning[reel] || state.isSettling[reel]) return;

    const tapTimeMs = performance.now();
    const rawPos = state.currentPos[reel];

    state.isSpinning[reel] = false;
    state.isSettling[reel] = true;
    cancelAnimationFrame(state.animId[reel]);
    stopButtons[reel].disabled = true;

    const settleTargetPos = getForwardSnapStop(rawPos);

    settleToStop(reel, rawPos, settleTargetPos, () => {
      const displayDoneTimeMs = performance.now();
      const displayLagMs = displayDoneTimeMs - tapTimeMs;

      if (reel === currentTask.reel) {
        const targetPos = currentTask.targetPos;
        const delta = getSignedDelta(rawPos, targetPos);
        const absDelta = Math.abs(delta);
        const direction = delta < 0 ? '早い' : delta > 0 ? '遅い' : 'ビタ';
        const judge = getJudge(absDelta);

        const topSymbol = settleTargetPos + 1;
        const midSymbol = mod(settleTargetPos + 1, TOTAL_SYMBOLS) + 1;
        const bottomSymbol = mod(settleTargetPos + 2, TOTAL_SYMBOLS) + 1;

        updateJudgeDisplay(judge, direction, absDelta, topSymbol, midSymbol, bottomSymbol);

        appendCenterLog({
          trial: ++state.trialCount,
          tapTimeMs: round3(tapTimeMs),
          rawPos: round4(rawPos),
          targetPos: round4(targetPos),
          delta: round4(delta),
          direction,
          judge: judge.label,
          snapPos: round4(settleTargetPos),
          displayLagMs: round3(displayLagMs)
        });
      }
    });
  }

  function settleToStop(reel, fromPos, toPos, onDone) {
    const startTime = performance.now();
    const duration = VISUALS.stopSettleDurationMs;
    const travel = getForwardDistance(fromPos, toPos);

    function tick(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      const eased = easeOutCubic(t);

      state.currentPos[reel] = mod(fromPos + travel * eased, TOTAL_SYMBOLS);
      updateReelDisplay(reel);

      if (t < 1) {
        state.settleAnimId[reel] = requestAnimationFrame(tick);
        return;
      }

      state.currentPos[reel] = mod(toPos, TOTAL_SYMBOLS);
      state.isSettling[reel] = false;
      setWrapperBlur(reel, false);
      updateReelDisplay(reel);

      if (typeof onDone === 'function') onDone();
    }

    state.settleAnimId[reel] = requestAnimationFrame(tick);
  }

  function getForwardSnapStop(rawPos) {
    // 回転方向にだけ進んで整列させる
    return mod(Math.ceil(rawPos - 1e-9), TOTAL_SYMBOLS);
  }

  function getForwardDistance(fromPos, toPos) {
    return mod(toPos - fromPos, TOTAL_SYMBOLS);
  }

  function resetJudgeDisplay() {
    judgeLabelEl.textContent = '-';
    judgeLabelEl.className = 'big-result muted';
    judgeDetailEl.textContent = '中リールを止めると表示';
    judgeDetailEl.className = 'small-result muted';
    reelViewEl.textContent = '停止後の見え方: -';
    reelViewEl.className = 'small-result muted';
  }

  function updateJudgeDisplay(judge, direction, absDelta, topSymbol, midSymbol, bottomSymbol) {
    judgeLabelEl.textContent = judge.label;
    judgeLabelEl.className = `big-result ${judge.className}`;
    judgeDetailEl.textContent = `${direction} | ${absDelta.toFixed(3)}コマズレ`;
    judgeDetailEl.className = `small-result ${judge.className}`;
    reelViewEl.textContent = `停止後の見え方: [上:${topSymbol} / 中:${midSymbol} / 下:${bottomSymbol}]`;
    reelViewEl.className = 'small-result';
  }

  function getSignedDelta(rawPos, targetPos) {
    let d = rawPos - targetPos;
    if (d > TOTAL_SYMBOLS / 2) d -= TOTAL_SYMBOLS;
    if (d < -TOTAL_SYMBOLS / 2) d += TOTAL_SYMBOLS;
    return d;
  }

  function getJudge(absDelta) {
    if (absDelta <= JUDGE_THRESHOLDS.perfect) {
      return { label: 'PERFECT', className: 'judge-good' };
    }
    if (absDelta <= JUDGE_THRESHOLDS.good) {
      return { label: 'GOOD', className: 'judge-info' };
    }
    if (absDelta <= JUDGE_THRESHOLDS.ok) {
      return { label: 'OK', className: 'judge-warn' };
    }
    return { label: 'MISS', className: 'judge-bad' };
  }

  function appendCenterLog(entry) {
    state.logs.push(entry);
    saveLogs();
    renderLogs();
    renderStats();
  }

  function renderLogs() {
    logCountEl.textContent = `件数: ${state.logs.length}`;

    const lines = [];
    lines.push('trial,tapTimeMs,rawPos,targetPos,delta,direction,judge,snapPos,displayLagMs');

    for (const log of state.logs) {
      lines.push([
        log.trial,
        log.tapTimeMs,
        log.rawPos,
        log.targetPos,
        log.delta,
        log.direction,
        log.judge,
        log.snapPos,
        log.displayLagMs
      ].join(','));
    }

    logOutputEl.value = lines.join('\n');
  }

  function renderStats() {
    const logs = state.logs;
    const count = logs.length;

    statCountEl.textContent = String(count);

    if (count === 0) {
      statAvgEl.textContent = '-';
      statPerfectRateEl.textContent = '-';
      statGoodRateEl.textContent = '-';
      statBalanceEl.textContent = '-';
      statTrendEl.textContent = '-';
      statTrendEl.className = '';
      return;
    }

    const avgDelta = logs.reduce((sum, row) => sum + Number(row.delta), 0) / count;
    const perfectCount = logs.filter(row => row.judge === 'PERFECT').length;
    const goodOrBetterCount = logs.filter(row => row.judge === 'PERFECT' || row.judge === 'GOOD').length;
    const earlyCount = logs.filter(row => row.direction === '早い').length;
    const lateCount = logs.filter(row => row.direction === '遅い').length;

    statAvgEl.textContent = `${formatSigned(avgDelta)}コマ`;
    statPerfectRateEl.textContent = `${((perfectCount / count) * 100).toFixed(1)}%`;
    statGoodRateEl.textContent = `${((goodOrBetterCount / count) * 100).toFixed(1)}%`;
    statBalanceEl.textContent = `${earlyCount} / ${lateCount}`;

    const trend = getTrendText(avgDelta);
    statTrendEl.textContent = trend.text;
    statTrendEl.className = trend.className;
  }

  function getTrendText(avgDelta) {
    if (avgDelta <= -0.30) {
      return { text: 'かなり早め', className: 'judge-bad' };
    }
    if (avgDelta < -0.10) {
      return { text: 'やや早め', className: 'judge-warn' };
    }
    if (avgDelta < 0.10) {
      return { text: 'ほぼ中央', className: 'judge-good' };
    }
    if (avgDelta < 0.30) {
      return { text: 'やや遅め', className: 'judge-warn' };
    }
    return { text: 'かなり遅め', className: 'judge-bad' };
  }

  function saveLogs() {
    localStorage.setItem(LOG_STORAGE_KEY, JSON.stringify(state.logs));
  }

  function loadLogs() {
    try {
      const raw = localStorage.getItem(LOG_STORAGE_KEY);
      if (!raw) return;

      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) return;

      state.logs = parsed;
      state.trialCount = parsed.reduce((max, row) => Math.max(max, Number(row.trial) || 0), 0);
    } catch (error) {
      console.error('ログ読込失敗', error);
      state.logs = [];
      state.trialCount = 0;
    }
  }

  async function copyLogs() {
    const text = logOutputEl.value;
    if (!text.trim()) return;

    try {
      await navigator.clipboard.writeText(text);
      copyLogBtn.textContent = 'コピー完了';
      setTimeout(() => {
        copyLogBtn.textContent = 'ログをコピー';
      }, 1200);
    } catch (error) {
      copyLogBtn.textContent = 'コピー失敗';
      setTimeout(() => {
        copyLogBtn.textContent = 'ログをコピー';
      }, 1200);
    }
  }

  function clearLogs() {
    state.logs = [];
    state.trialCount = 0;
    saveLogs();
    renderLogs();
    renderStats();
    resetJudgeDisplay();
  }

  function refreshAllDisplays() {
    reels.forEach(updateReelDisplay);
  }

  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function formatSigned(value) {
    const rounded = value.toFixed(3);
    return value > 0 ? `+${rounded}` : rounded;
  }

  function mod(n, m) {
    return ((n % m) + m) % m;
  }

  function round3(n) {
    return Number(n.toFixed(3));
  }

  function round4(n) {
    return Number(n.toFixed(4));
  }

  document.getElementById('start-btn').addEventListener('click', startAllReels);

  document.querySelectorAll('.stop-btn').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      const reel = e.currentTarget.dataset.reel;
      stopReel(reel);
    });
  });

  copyLogBtn.addEventListener('click', copyLogs);
  clearLogBtn.addEventListener('click', clearLogs);
  window.addEventListener('resize', refreshAllDisplays);

  initTaskDisplay();
  loadLogs();
  renderLogs();
  renderStats();
  resetJudgeDisplay();
  refreshAllDisplays();
})();
</script>
</body>
</html>
